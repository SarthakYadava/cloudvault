services:
  app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AWS_PROFILE: ${AWS_PROFILE:-file-java90}
      AWS_REGION: ${AWS_REGION:-eu-north-1}
      S3_BUCKET: ${S3_BUCKET:-file-java90}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-PT1H}
      PRESIGNED_URL_EXPIRATION: ${PRESIGNED_URL_EXPIRATION:-PT10M}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      EMAIL_DELIVERY: ${EMAIL_DELIVERY:-log}
      EMAIL_FROM: ${EMAIL_FROM:-notifications@cloudvault.local}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-true}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      MAIL_HEALTH_ENABLED: ${MAIL_HEALTH_ENABLED:-false}
      DB_URL: jdbc:postgresql://postgres:5432/cloudvault
      DB_USERNAME: ${DB_USERNAME:-cloudvault}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      - "8080:8080"
    volumes:
      - type: bind
        source: ${AWS_CREDENTIALS_DIR:?Set AWS_CREDENTIALS_DIR in .env}
        target: /home/cloudvault/.aws
        read_only: true
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloudvault
      POSTGRES_USER: ${DB_USERNAME:-cloudvault}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - cloudvault-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-cloudvault} -d cloudvault"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cloudvault-postgres:
