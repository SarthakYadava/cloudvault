services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cloudvault
      POSTGRES_USER: cloudvault
      POSTGRES_PASSWORD: cloudvault
    ports:
      - "5432:5432"
    volumes:
      - cloudvault-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudvault -d cloudvault"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cloudvault-postgres:
