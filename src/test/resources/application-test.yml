spring:
  datasource:
    url: jdbc:h2:mem:cloudvault;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate

cloudvault:
  aws:
    region: eu-north-1
    bucket: cloudvault-test
  files:
    max-size-bytes: 10485760
    presigned-url-expiration: PT10M
    allowed-content-types:
      - application/pdf
      - image/jpeg
      - image/png
      - text/plain
  auth:
    jwt-secret: cloudvault-test-secret-key-at-least-32-characters
    issuer: cloudvault-test
    token-expiration: PT1H
  invitations:
    expiration: P7D
  notifications:
    delivery: log
    from-address: notifications@cloudvault.test
    app-base-url: http://localhost:8080
    deadline-reminder-days: 1
    deadline-reminder-cron: 0 0 9 * * *
